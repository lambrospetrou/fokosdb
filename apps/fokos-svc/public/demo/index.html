<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css" />
		<title>FokosDB Demo</title>
		<style>
			pre {
				background: var(--pico-code-background-color);
				border-radius: var(--pico-border-radius);
				padding: 1rem;
				overflow-x: auto;
				font-size: 0.75rem;
				max-height: 400px;
			}
			.empty {
				text-align: center;
				color: var(--pico-muted-color);
				padding: 2rem 0;
			}
			.spinner {
				display: inline-block;
				width: 1rem;
				height: 1rem;
				border: 2px solid currentColor;
				border-top-color: transparent;
				border-radius: 50%;
				animation: spin 0.6s linear infinite;
				animation-play-state: running;
				vertical-align: middle;
				margin-right: 0.3rem;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			nav select {
				margin: 0;
				width: auto;
			}
			.stat-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
				gap: 1rem;
				margin-bottom: 1rem;
			}
			.stat-box {
				background: var(--pico-card-background-color);
				border: 1px solid var(--pico-muted-border-color);
				border-radius: var(--pico-border-radius);
				padding: 0.75rem 1rem;
			}
			.stat-box small {
				color: var(--pico-muted-color);
				font-size: 0.75rem;
				display: block;
				margin-bottom: 0.2rem;
			}
			.stat-box strong {
				font-size: 1.3rem;
			}
			.actor-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 0.3rem 0;
				border-bottom: 1px solid var(--pico-muted-border-color);
				font-size: 0.8rem;
				gap: 0.5rem;
			}
			.actor-row:last-child {
				border-bottom: none;
			}
			.actor-row code {
				font-size: 0.75rem;
				word-break: break-all;
			}
			.actor-bar-wrap {
				display: flex;
				align-items: center;
				gap: 0.4rem;
				min-width: 120px;
			}
			.actor-bar {
				height: 6px;
				background: var(--pico-primary);
				border-radius: 3px;
				flex-shrink: 0;
			}
			article > header {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			article > header button {
				margin: 0;
				padding: 0.2rem 0.6rem;
				font-size: 0.8rem;
			}
			.account-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(5.5rem, 1fr));
				gap: 0.4rem;
			}
			.account-box {
				background: var(--pico-card-background-color);
				border: 1px solid var(--pico-muted-border-color);
				border-radius: var(--pico-border-radius);
				padding: 0.35rem 0.6rem;
				line-height: 1.3;
			}
			.account-box small {
				color: var(--pico-muted-color);
				font-size: 0.65rem;
				display: block;
			}
			.account-box span {
				font-size: 0.9rem;
				font-weight: 600;
			}
		</style>
		<script type="importmap">
			{
				"imports": {
					"preact": "https://esm.sh/preact@10.23.1",
					"preact/": "https://esm.sh/preact@10.23.1/",
					"@preact/signals": "https://esm.sh/@preact/signals@1.3.0?external=preact",
					"htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
				}
			}
		</script>
	</head>
	<body>
		<div id="root" style="padding-bottom: 4rem"></div>

		<script type="module">
			import { h, render } from "preact";
			import { signal, computed, effect, batch } from "@preact/signals";
			import { html } from "htm/preact";

			// ── Demos registry ────────────────────────────────────────────────────────────
			const DEMOS = [
				{ id: "split", label: "Split Demo" },
				{ id: "transactions", label: "Transactions Demo" },
			];

			// ── Global state ──────────────────────────────────────────────────────────────
			const hashId = location.hash.slice(1);
			const activeDemo = signal(DEMOS.some((d) => d.id === hashId) ? hashId : DEMOS[0].id);
			const secretToken = signal(localStorage.getItem("fokos-secret-token") ?? "");

			effect(() => {
				localStorage.setItem("fokos-secret-token", secretToken.value);
			});
			effect(() => {
				history.replaceState(null, "", "#" + activeDemo.value);
			});
			window.addEventListener("hashchange", () => {
				const id = location.hash.slice(1);
				if (DEMOS.some((d) => d.id === id)) activeDemo.value = id;
			});

			// ── Shared partition config ───────────────────────────────────────────────────
			const cfg = {
				tableName: signal("demo"),
				rootTreesN: signal(3),
				hashSplitN: signal(4),
				hashMaxMb: signal(5),
				rangeSplitN: signal(4),
				rangeMaxMb: signal(5),
			};

			function getPartitionOptions() {
				return {
					rootTreesN: cfg.rootTreesN.value,
					hashSplitN: cfg.hashSplitN.value,
					rangeSplitN: cfg.rangeSplitN.value,
					hashSplitConditions: { maxSizeMb: cfg.hashMaxMb.value },
					rangeSplitConditions: { maxSizeMb: cfg.rangeMaxMb.value },
				};
			}

			// ── API ───────────────────────────────────────────────────────────────────────
			async function apiFetch(path, opts = {}) {
				const res = await fetch(`/api${path}`, {
					headers: {
						"Content-Type": "application/json",
						"x-fokos-secret-token": secretToken.value,
						...opts.headers,
					},
					...opts,
				});
				const text = await res.text();
				let body;
				try {
					body = JSON.parse(text);
				} catch {
					body = text;
				}
				if (!res.ok) throw new Error(body?.error || body?.message || `HTTP ${res.status}`);

				const st = res.headers.get("server-timing");
				let workerDurMs = null;
				if (st) {
					const m = st.match(/worker;dur=([\d.]+)/);
					if (m) workerDurMs = parseFloat(m[1]);
				}
				return { body, workerDurMs };
			}

			// ── Shared helpers ────────────────────────────────────────────────────────────
			const MAX_SAMPLES = 1_000;

			function avg(arr) {
				return arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null;
			}
			function p99(arr) {
				if (!arr.length) return null;
				const sorted = [...arr].sort((a, b) => a - b);
				return sorted[Math.max(0, Math.ceil(sorted.length * 0.99) - 1)];
			}
			function fmtMs(ms) {
				return ms === null ? "—" : ms.toFixed(1) + " ms";
			}
			function appendCapped(arr, val) {
				return arr.length >= MAX_SAMPLES ? [...arr.slice(1), val] : [...arr, val];
			}
			function pickRandom(arr, k) {
				const copy = [...arr];
				for (let i = copy.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[copy[i], copy[j]] = [copy[j], copy[i]];
				}
				return copy.slice(0, k);
			}
			function decodeData(item) {
				return item.dataEncoding === "base64" ? atob(item.data) : item.data;
			}

			// ── Shared components ─────────────────────────────────────────────────────────
			function Spinner() {
				return html`<span class="spinner"></span>`;
			}

			function NumInput({ label, sig, min = 1, step = 1, max }) {
				return html`
					<label>
						${label}
						<input
							type="number"
							min=${min}
							max=${max}
							step=${step}
							value=${sig.value}
							onInput=${(e) => (sig.value = Number(e.target.value))}
						/>
					</label>
				`;
			}

			// ── Shared: Partition Context ─────────────────────────────────────────────────
			const destroying = signal(false);

			async function destroyDB() {
				if (destroying.value) return;
				destroying.value = true;
				try {
					await apiFetch(`/databases/${cfg.tableName.value}`, {
						method: "DELETE",
						body: JSON.stringify({ partitionOptions: getPartitionOptions() }),
					});
				} finally {
					destroying.value = false;
				}
			}

			function PartitionContext() {
				const anyRunning = split.running.value || tx.running.value;
				return html`
					<article>
						<details open>
							<summary style="display:flex;align-items:center;justify-content:space-between">
								<strong>Partition Context</strong>
								<button
									class="secondary outline"
									style="margin:0;padding:0.2rem 0.6rem;font-size:0.8rem"
									disabled=${destroying.value || anyRunning}
									onClick=${(e) => {
										e.preventDefault();
										destroyDB();
									}}
								>
									${destroying.value ? html`<${Spinner} />Destroying…` : "Destroy DB"}
								</button>
							</summary>
							<div class="grid" style="margin-top:0.75rem">
								<label
									>Table name
									<input type="text" value=${cfg.tableName.value} onInput=${(e) => (cfg.tableName.value = e.target.value)} />
								</label>
								<${NumInput} label="Root trees (N)" sig=${cfg.rootTreesN} />
							</div>
							<div class="grid">
								<${NumInput} label="Hash partitions (N)" sig=${cfg.hashSplitN} />
								<${NumInput} label="Hash max size (MB)" sig=${cfg.hashMaxMb} />
							</div>
							<div class="grid">
								<${NumInput} label="Range partitions (N)" sig=${cfg.rangeSplitN} />
								<${NumInput} label="Range max size (MB)" sig=${cfg.rangeMaxMb} />
							</div>
						</details>
					</article>
				`;
			}

			// ── Split Demo — state ────────────────────────────────────────────────────────
			const split = {
				// load config
				parallelN: signal(10),
				kbPerItem: signal(50),
				hashMode: signal("random"),
				hashValue: signal("fokos-hash-key"),
				sortMode: signal("random"),
				sortValue: signal("fokos-sort-key"),
				// run state
				running: signal(false),
				// stats
				actorHits: signal({}),
				browserLats: signal([]),
				workerLats: signal([]),
				forwardCounts: signal([]),
				count: signal(0),
				errors: signal(0),
				runStart: signal(null),
				reqPerSec: signal(0),
			};
			const splitAvgBrowser = computed(() => avg(split.browserLats.value));
			const splitP99Browser = computed(() => p99(split.browserLats.value));
			const splitAvgWorker = computed(() => avg(split.workerLats.value));
			const splitP99Worker = computed(() => p99(split.workerLats.value));
			const splitAvgForward = computed(() => avg(split.forwardCounts.value));
			const splitP99Forward = computed(() => p99(split.forwardCounts.value));

			function splitResetStats() {
				batch(() => {
					split.actorHits.value = {};
					split.browserLats.value = [];
					split.workerLats.value = [];
					split.forwardCounts.value = [];
					split.count.value = 0;
					split.errors.value = 0;
					split.runStart.value = split.running.value ? Date.now() : null;
					split.reqPerSec.value = 0;
				});
			}

			function splitRecordResponse(browserMs, workerMs, actorValue, dbSize, forwardCount) {
				batch(() => {
					const count = split.count.value + 1;
					split.count.value = count;
					split.browserLats.value = appendCapped(split.browserLats.value, browserMs);
					if (workerMs !== null) split.workerLats.value = appendCapped(split.workerLats.value, workerMs);
					if (forwardCount !== null) split.forwardCounts.value = appendCapped(split.forwardCounts.value, forwardCount);
					if (actorValue != null) {
						const key = typeof actorValue === "string" ? actorValue : JSON.stringify(actorValue);
						const hits = { ...split.actorHits.value };
						const prev = hits[key] ?? { count: 0, dbSize: null };
						hits[key] = { count: prev.count + 1, dbSize: dbSize ?? prev.dbSize };
						split.actorHits.value = hits;
					}
					const elapsed = (Date.now() - (split.runStart.value ?? Date.now())) / 1000;
					split.reqPerSec.value = elapsed > 0.1 ? count / elapsed : 0;
				});
			}

			function resolveKey(mode, custom, same) {
				if (mode === "random") return crypto.randomUUID();
				if (mode === "same") return same;
				return custom;
			}

			let splitAbort = null;

			async function splitWorker(abortSignal, sameHash, sameSort, data) {
				while (!abortSignal.aborted) {
					const hashKey = resolveKey(split.hashMode.value, split.hashValue.value, sameHash);
					const sortKey = resolveKey(split.sortMode.value, split.sortValue.value, sameSort);
					const t0 = performance.now();
					try {
						const { body, workerDurMs } = await apiFetch(`/rpc/${cfg.tableName.value}/putItem`, {
							method: "POST",
							body: JSON.stringify({
								hashKey,
								sortKey,
								data,
								partitionOptions: getPartitionOptions(),
							}),
							signal: abortSignal,
						});
						splitRecordResponse(
							performance.now() - t0,
							workerDurMs,
							body?.meta?.servedByActorName ?? null,
							body?.meta?.databaseSize ?? null,
							body?.meta?.forwardCount ?? null,
						);
					} catch (e) {
						if (abortSignal.aborted) break;
						split.errors.value += 1;
					}
				}
			}

			async function splitStart() {
				if (split.running.value) return;
				splitAbort = new AbortController();
				const sameHash = crypto.randomUUID();
				const sameSort = crypto.randomUUID();
				const data = "x".repeat(Math.max(1, Math.floor(split.kbPerItem.value * 1024)));
				split.runStart.value = Date.now();
				split.running.value = true;
				await Promise.allSettled(
					Array.from({ length: split.parallelN.value }, () => splitWorker(splitAbort.signal, sameHash, sameSort, data)),
				);
				split.running.value = false;
			}

			function splitStop() {
				splitAbort?.abort();
			}

			// ── Split Demo — components ───────────────────────────────────────────────────
			function KeyConfig({ label, modeSignal, valueSignal }) {
				const mode = modeSignal.value;
				return html`
					<div>
						<label style="margin-bottom:0.25rem">${label}</label>
						<select value=${mode} onChange=${(e) => (modeSignal.value = e.target.value)}>
							<option value="random">Random — unique per request</option>
							<option value="same">Same — fixed once per run</option>
							<option value="custom">Custom</option>
						</select>
						${mode === "custom" &&
						html`
							<input
								type="text"
								placeholder="key value"
								value=${valueSignal.value}
								onInput=${(e) => (valueSignal.value = e.target.value)}
								style="margin-top:0.4rem"
							/>
						`}
						${mode === "same" &&
						html`
							<small style="color:var(--pico-muted-color)"
								>One random value is generated when the run starts and reused for all requests.</small
							>
						`}
					</div>
				`;
			}

			function SplitDemo() {
				const actors = split.actorHits.value;
				const actorList = Object.entries(actors).sort((a, b) => a[1].count - b[1].count);
				const total = split.count.value;
				const maxHits = actorList.at(-1)?.[1].count ?? 1;

				return html`
					<article>
						<header><strong>Load Generator</strong></header>
						<div class="grid">
							<${NumInput} label="Parallel requests" sig=${split.parallelN} />
							<${NumInput} label="KB per item" sig=${split.kbPerItem} min=${0.1} step=${0.1} />
						</div>
						<details>
							<summary>Key options</summary>
							<div class="grid" style="margin-top:0.75rem">
								<${KeyConfig} label="Hash key" modeSignal=${split.hashMode} valueSignal=${split.hashValue} />
								<${KeyConfig} label="Sort key" modeSignal=${split.sortMode} valueSignal=${split.sortValue} />
							</div>
						</details>
						<div style="display:flex;gap:0.5rem;margin-top:1rem">
							<button class=${split.running.value ? "secondary" : ""} onClick=${split.running.value ? splitStop : splitStart}>
								${split.running.value ? html`<${Spinner} />Stop` : "Start"}
							</button>
						</div>
					</article>

					<article>
						<header>
							<strong>Results</strong>
							<button class="secondary outline" onClick=${splitResetStats}>Reset</button>
						</header>

						<div class="stat-grid">
							<div class="stat-box"><small>Requests</small><strong>${total.toLocaleString()}</strong></div>
							<div class="stat-box"><small>Errors</small><strong>${split.errors.value.toLocaleString()}</strong></div>
							<div class="stat-box"><small>Req / s</small><strong>${split.reqPerSec.value.toFixed(1)}</strong></div>
							<div class="stat-box"><small>Unique actors</small><strong>${actorList.length}</strong></div>
							<div class="stat-box">
								<small>Browser avg / p99</small><strong>${fmtMs(splitAvgBrowser.value)} / ${fmtMs(splitP99Browser.value)}</strong>
							</div>
							<div class="stat-box">
								<small>Worker avg / p99</small><strong>${fmtMs(splitAvgWorker.value)} / ${fmtMs(splitP99Worker.value)}</strong>
							</div>
							<div class="stat-box">
								<small>Forwards avg / p99</small
								><strong>${splitAvgForward.value?.toFixed(1) ?? "—"} / ${splitP99Forward.value?.toFixed(1) ?? "—"}</strong>
							</div>
						</div>
						<small style="color:var(--pico-muted-color)">Latency based on last ${MAX_SAMPLES.toLocaleString()} samples.</small>

						<div style="margin-top:1rem">
							<strong>Actor distribution</strong>
							<div style="margin-top:0.5rem">
								${actorList.length === 0
									? html`<p class="empty">No data yet.</p>`
									: actorList.map(
											([name, { count, dbSize }]) => html`
												<div class="actor-row" key=${name}>
													<code>${name}</code>
													<span style="color:var(--pico-muted-color);font-size:0.72rem;margin-left:0.5rem;white-space:nowrap">
														${dbSize !== null ? (dbSize / 1024 / 1024).toFixed(2) + " MB" : ""}
													</span>
													<div class="actor-bar-wrap" style="margin-left:auto">
														<div class="actor-bar" style="width:${Math.round((count / maxHits) * 80)}px"></div>
														<span style="white-space:nowrap;font-size:0.75rem">
															${count.toLocaleString()} (${total > 0 ? ((count / total) * 100).toFixed(1) : "0"}%)
														</span>
													</div>
												</div>
											`,
										)}
							</div>
						</div>
					</article>
				`;
			}

			// ── Transactions Demo — state ─────────────────────────────────────────────────
			const INITIAL_BALANCE = 1000;
			const TX_LOG_MAX = 100;

			const tx = {
				// load config
				parallelN: signal(1),
				k: signal(2),
				numAccounts: signal(10),
				// run state
				running: signal(false),
				initializing: signal(false),
				refreshing: signal(false),
				// account cache: { id, balance, version } — balance null means unknown
				accounts: signal([]),
				// stats
				committed: signal(0),
				cancelled: signal(0),
				errors: signal(0),
				browserLats: signal([]),
				workerLats: signal([]),
				runStart: signal(null),
				reqPerSec: signal(0),
				// log: newest-first array of { accounts: [{id, delta}], n, outcome }
				log: signal([]),
			};
			const txAccountIds = computed(() => Array.from({ length: tx.numAccounts.value }, (_, i) => `acct-${i}`));
			// Reset account display and log whenever the account count changes
			effect(() => {
				tx.accounts.value = txAccountIds.value.map((id) => ({ id, balance: null, version: null }));
				tx.log.value = [];
			});

			const txAvgBrowser = computed(() => avg(tx.browserLats.value));
			const txP99Browser = computed(() => p99(tx.browserLats.value));
			const txAvgWorker = computed(() => avg(tx.workerLats.value));
			const txP99Worker = computed(() => p99(tx.workerLats.value));

			function txResetStats() {
				batch(() => {
					tx.committed.value = 0;
					tx.cancelled.value = 0;
					tx.errors.value = 0;
					tx.browserLats.value = [];
					tx.workerLats.value = [];
					tx.runStart.value = tx.running.value ? Date.now() : null;
					tx.reqPerSec.value = 0;
					tx.log.value = [];
				});
			}

			async function txInitAccounts() {
				if (tx.initializing.value) return;
				tx.initializing.value = true;
				try {
					await apiFetch(`/rpc/${cfg.tableName.value}/transactWriteItems`, {
						method: "POST",
						body: JSON.stringify({
							operations: txAccountIds.value.map((id) => ({
								hashKey: id,
								operation: "put",
								data: JSON.stringify({ balance: INITIAL_BALANCE }),
							})),
							partitionOptions: getPartitionOptions(),
						}),
					});
					tx.accounts.value = txAccountIds.value.map((id) => ({ id, balance: INITIAL_BALANCE, version: null }));
					txResetStats();
				} finally {
					tx.initializing.value = false;
				}
			}

			async function txRefreshAccounts() {
				if (tx.refreshing.value) return;
				tx.refreshing.value = true;
				try {
					const ids = txAccountIds.value;
					const results = await Promise.all(
						ids.map((id) =>
							apiFetch(`/rpc/${cfg.tableName.value}/getItem`, {
								method: "POST",
								body: JSON.stringify({ hashKey: id, partitionOptions: getPartitionOptions() }),
							}),
						),
					);
					tx.accounts.value = ids.map((id, i) => {
						const r = results[i].body;
						if (!r.found) return { id, balance: null, version: null };
						const data = JSON.parse(decodeData(r.item));
						return { id, balance: data.balance, version: r.item.version };
					});
				} finally {
					tx.refreshing.value = false;
				}
			}

			let txAbort = null;

			async function txWorker(abortSignal) {
				while (!abortSignal.aborted) {
					const accountIds = txAccountIds.value;
					const selected = pickRandom(accountIds, Math.min(tx.k.value, accountIds.length));
					const t0 = performance.now();
					try {
						// Read current state of selected accounts
						const reads = await Promise.all(
							selected.map((id) =>
								apiFetch(`/rpc/${cfg.tableName.value}/getItem`, {
									method: "POST",
									body: JSON.stringify({ hashKey: id, partitionOptions: getPartitionOptions() }),
								}),
							),
						);

						if (abortSignal.aborted) break;

						const items = reads.map((r, i) => {
							const b = r.body;
							if (!b.found) return null;
							return {
								id: selected[i],
								balance: JSON.parse(decodeData(b.item)).balance,
								version: b.item.version,
							};
						});

						// Skip if any account not yet initialized
						if (items.some((x) => x === null)) continue;

						// items[0] is the winner; each of the other K-1 accounts transfers N to it
						const n = Math.floor(Math.random() * 10) + 1;
						const deltas = items.map((_, i) => (i === 0 ? (items.length - 1) * n : -n));
						const newBalances = items.map((item, i) => item.balance + deltas[i]);

						const { body, workerDurMs } = await apiFetch(`/rpc/${cfg.tableName.value}/transactWriteItems`, {
							method: "POST",
							body: JSON.stringify({
								operations: items.map((item, i) => ({
									hashKey: item.id,
									operation: "put",
									data: JSON.stringify({ balance: newBalances[i] }),
									conditions: [{ type: "attribute_equals", attribute: "v", value: item.version }],
								})),
								partitionOptions: getPartitionOptions(),
							}),
							signal: abortSignal,
						});

						if (abortSignal.aborted) break;

						const browserMs = performance.now() - t0;

						batch(() => {
							const logEntry = {
								accounts: items.map((item, i) => ({ id: item.id, delta: deltas[i] })),
								n,
								outcome: body.outcome,
								reason: body.outcome !== "committed" ? (body.reason ?? null) : null,
							};
							tx.log.value = [logEntry, ...tx.log.value.slice(0, TX_LOG_MAX - 1)];
							if (body.outcome === "committed") {
								tx.committed.value += 1;
								tx.browserLats.value = appendCapped(tx.browserLats.value, browserMs);
								if (workerDurMs !== null) tx.workerLats.value = appendCapped(tx.workerLats.value, workerDurMs);
								// Update local account cache with new balances
								const accounts = [...tx.accounts.value];
								items.forEach((item, i) => {
									const idx = accountIds.indexOf(item.id);
									if (idx >= 0) accounts[idx] = { ...accounts[idx], balance: newBalances[i] };
								});
								tx.accounts.value = accounts;
							} else {
								tx.cancelled.value += 1;
							}
							const total = tx.committed.value + tx.cancelled.value;
							const elapsed = (Date.now() - (tx.runStart.value ?? Date.now())) / 1000;
							tx.reqPerSec.value = elapsed > 0.1 ? total / elapsed : 0;
						});
					} catch (e) {
						if (abortSignal.aborted) break;
						tx.errors.value += 1;
					} finally {
						await new Promise((resolve) => setTimeout(resolve, 5)); // avoid transaction timestamp conflicts locally with wrangler dev.
					}
				}
			}

			async function txStart() {
				if (tx.running.value) return;
				txAbort = new AbortController();
				tx.runStart.value = Date.now();
				tx.running.value = true;
				await Promise.allSettled(Array.from({ length: tx.parallelN.value }, () => txWorker(txAbort.signal)));
				tx.running.value = false;
			}

			function txStop() {
				txAbort?.abort();
			}

			// ── Transactions Demo — component ─────────────────────────────────────────────
			function TransactionsDemo() {
				const accounts = tx.accounts.value;
				const knownBalances = accounts.filter((a) => a.balance !== null);
				const totalBalance = knownBalances.reduce((s, a) => s + a.balance, 0);
				const allKnown = knownBalances.length === tx.numAccounts.value;
				const expectedTotal = tx.numAccounts.value * INITIAL_BALANCE;

				return html`
					<article>
						<header><strong>Load Generator</strong></header>
						<div class="grid">
							<${NumInput} label="Parallel workers" sig=${tx.parallelN} />
							<${NumInput} label="Number of accounts" sig=${tx.numAccounts} min=${2} max=${100} />
							<${NumInput} label="Per transaction (K)" sig=${tx.k} min=${2} max=${tx.numAccounts.value} />
						</div>
						<div style="display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap">
							<button onClick=${txInitAccounts} disabled=${tx.initializing.value || tx.running.value}>
								${tx.initializing.value ? html`<${Spinner} />Initializing…` : "Initialize Accounts"}
							</button>
							<button
								class=${tx.running.value ? "secondary" : ""}
								onClick=${tx.running.value ? txStop : txStart}
								disabled=${tx.initializing.value}
							>
								${tx.running.value ? html`<${Spinner} />Stop` : "Start"}
							</button>
							<button class="secondary outline" onClick=${txRefreshAccounts} disabled=${tx.refreshing.value || tx.running.value}>
								${tx.refreshing.value ? html`<${Spinner} />Refreshing…` : "Refresh Accounts"}
							</button>
						</div>
					</article>

					<article>
						<header>
							<strong>Accounts</strong>
							<span style="font-size:0.85rem;color:var(--pico-muted-color)">
								Total:${" "}
								<strong style="font-size:inherit;color:${allKnown && totalBalance !== expectedTotal ? "var(--pico-del-color)" : "inherit"}">
									${allKnown ? totalBalance.toLocaleString() : "—"}
								</strong>
								${allKnown ? html`<small> / ${expectedTotal.toLocaleString()} expected</small>` : ""}
							</span>
						</header>
						<div class="account-grid" style="margin-top:0.75rem">
							${accounts.map(
								({ id, balance }) => html`
									<div class="account-box" key=${id}>
										<small>${id}</small>
										<span>${balance !== null ? balance.toLocaleString() : "—"}</span>
									</div>
								`,
							)}
						</div>
					</article>

					<article>
						<header>
							<strong>Results</strong>
							<button class="secondary outline" onClick=${txResetStats}>Reset</button>
						</header>
						<div class="stat-grid">
							<div class="stat-box"><small>Committed</small><strong>${tx.committed.value.toLocaleString()}</strong></div>
							<div class="stat-box"><small>Cancelled (conflict)</small><strong>${tx.cancelled.value.toLocaleString()}</strong></div>
							<div class="stat-box"><small>Errors</small><strong>${tx.errors.value.toLocaleString()}</strong></div>
							<div class="stat-box"><small>Tx / s</small><strong>${tx.reqPerSec.value.toFixed(1)}</strong></div>
							<div class="stat-box">
								<small>Browser avg / p99</small>
								<strong>${fmtMs(txAvgBrowser.value)} / ${fmtMs(txP99Browser.value)}</strong>
							</div>
							<div class="stat-box">
								<small>Worker avg / p99</small>
								<strong>${fmtMs(txAvgWorker.value)} / ${fmtMs(txP99Worker.value)}</strong>
							</div>
						</div>
						<small style="color:var(--pico-muted-color)"
							>Latency based on last ${MAX_SAMPLES.toLocaleString()} samples. Cancelled transactions are retried automatically on the next
							worker loop.</small
						>
					</article>

					<article>
						<header><strong>Transaction Log</strong></header>
						${tx.log.value.length === 0
							? html`<p class="empty">No transactions yet.</p>`
							: html`
									<div style="max-height:320px;overflow-y:auto">
										${tx.log.value.map(
											(entry, i) => html`
												<div class="actor-row" key=${i} style="flex-direction:column;align-items:flex-start">
													<div style="display:flex;align-items:center;gap:0.5rem;width:100%">
														<span
															style="font-size:0.7rem;padding:0.1rem 0.35rem;border-radius:3px;flex-shrink:0;font-weight:600;background:${entry.outcome ===
															"committed"
																? "#2a7a2a"
																: "#7a2a2a"};color:#fff"
														>
															${entry.outcome === "committed" ? "ok" : "x"}
														</span>
														<span style="display:flex;flex-wrap:wrap;gap:0.5rem;font-size:0.75rem">
															${entry.accounts.map(
																({ id, delta }) => html`
																	<span>
																		<code>${id}</code>${" "}
																		<strong
																			style="color:${delta > 0 ? "var(--pico-ins-color, #2a7a2a)" : "var(--pico-del-color, #c0392b)"}"
																		>
																			${delta > 0 ? "+" : ""}${delta}
																		</strong>
																	</span>
																`,
															)}
														</span>
													</div>
													${entry.reason
														? html`<span style="font-size:0.7rem;color:var(--pico-muted-color);padding-left:0.1rem">
																${entry.reason.type}${entry.reason.hashKey ? html` · <code>${entry.reason.hashKey}</code>` : ""}
															</span>`
														: null}
												</div>
											`,
										)}
									</div>
								`}
					</article>
				`;
			}

			// ── Demo registry ─────────────────────────────────────────────────────────────
			const DEMO_COMPONENTS = { split: SplitDemo, transactions: TransactionsDemo };

			// ── Admin tools ───────────────────────────────────────────────────────────────
			function AdminTools() {
				return html`
					<details>
						<summary><strong>Admin tools</strong></summary>
						<label>
							Secret token
							<input
								type="password"
								placeholder="x-fokos-secret-token"
								value=${secretToken.value}
								onInput=${(e) => (secretToken.value = e.target.value)}
							/>
						</label>
					</details>
				`;
			}

			// ── App shell ─────────────────────────────────────────────────────────────────
			function App() {
				const DemoComp = DEMO_COMPONENTS[activeDemo.value] ?? (() => html`<p class="empty">Unknown demo.</p>`);
				return html`
					<div>
						<nav class="container">
							<ul>
								<li><strong>FokosDB Demo</strong></li>
							</ul>
							<ul>
								<li>
									<select onChange=${(e) => (activeDemo.value = e.target.value)}>
										${DEMOS.map((d) => html` <option key=${d.id} value=${d.id} selected=${activeDemo.value === d.id}>${d.label}</option> `)}
									</select>
								</li>
							</ul>
						</nav>
						<main class="container">
							<${PartitionContext} />
							<${DemoComp} />
						</main>
						<footer class="container">
							<hr />
							<${AdminTools} />
						</footer>
					</div>
				`;
			}

			// ── Boot ──────────────────────────────────────────────────────────────────────
			render(html`<${App} />`, document.getElementById("root"));
		</script>
	</body>
</html>
